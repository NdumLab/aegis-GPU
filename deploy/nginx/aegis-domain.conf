# aegisgpu.com — canonical public vhost for Aegis GPU.
# aegis.yerikasystems.com (the original home) and www.aegisgpu.com 301 here.
# Kept separate from aegis-gpu.conf (the default_server / IP vhost).
# TLS: Let's Encrypt via certbot webroot; issue once on a new host with
#   certbot certonly --webroot -w /var/www/letsencrypt \
#     -d aegisgpu.com -d www.aegisgpu.com --key-type ecdsa \
#     --cert-name aegisgpu.com --deploy-hook 'systemctl reload nginx'
# (and the same for aegis.yerikasystems.com while the redirect stays up).

# ---- Port 80: ACME + redirect everything to the canonical HTTPS host ----

server {
    listen 80;
    listen [::]:80;
    server_name aegisgpu.com www.aegisgpu.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://aegisgpu.com$request_uri;
    }
}

server {
    listen 80;
    server_name aegis.yerikasystems.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://aegisgpu.com$request_uri;
    }
}

# ---- HTTPS: canonical application vhost ----

server {
    # http2 as a listen flag: host runs nginx 1.24, which predates "http2 on;"
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aegisgpu.com;
    limit_req_status 429;

    ssl_certificate     /etc/letsencrypt/live/aegisgpu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aegisgpu.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:AEGISSSL:10m;

    root /var/www/html;
    index index.html;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'" always;

    location ~ ^/api/v1/diagnose/ {
        limit_req zone=aegis_ai_diagnose burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /api/v1/auth/login {
        limit_req zone=aegis_login_limit burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/auth/register {
        limit_req zone=aegis_login_limit burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/auth/reset {
        limit_req zone=aegis_login_limit burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'" always;
        access_log off;
        try_files $uri =404;
    }

    location ~ ^/(?:css/styles\.css|js/(?:app|runtime|cluster-sim|cluster-dashboard|cluster-terminal)\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'" always;
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(?:woff2)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location / {
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'" always;
        try_files $uri $uri/ =404;
    }
}

# ---- HTTPS: www.aegisgpu.com -> apex (same cert covers both names) ----

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.aegisgpu.com;

    ssl_certificate     /etc/letsencrypt/live/aegisgpu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aegisgpu.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://aegisgpu.com$request_uri;
}

# ---- HTTPS: legacy aegis.yerikasystems.com -> new canonical home ----
# Keeps its own LE cert (renewed via the port-80 ACME block above) so old
# HTTPS links and bookmarks redirect cleanly instead of failing the handshake.

server {
    listen 443 ssl http2;
    server_name aegis.yerikasystems.com;

    ssl_certificate     /etc/letsencrypt/live/aegis.yerikasystems.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aegis.yerikasystems.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://aegisgpu.com$request_uri;
}
