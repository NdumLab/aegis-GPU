name: backend-smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python3 -m pip install -r backend/requirements.txt
      - name: Run backend syntax check
        run: python3 -m py_compile backend/aegis_api.py backend/node_scraper.py backend/tests/test_api.py backend/tests/test_api_unittest.py
      - name: Run backend unittest smoke
        run: python3 -m unittest discover -s backend/tests -p 'test_*unittest.py'
