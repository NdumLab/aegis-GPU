name: frontend-smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run deterministic frontend smoke tests
        run: >
          python3 -m unittest
          frontend/tests/test_auth_session_reset.py
          frontend/tests/test_cluster_sim_state.py
          frontend/tests/test_cluster_terminal_state.py
          frontend/tests/test_frontend_smoke.py
          frontend/tests/test_lab_data_structure.py
